<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nusa Point Reward</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="container">
  <div class="header"><h3 id="user">Hello 👋</h3></div>

  <div class="orb" id="orb">
    <span id="orbText">Mining</span>
  </div>

  <div class="balance">
    <b id="balance">0.00</b> NPR<br>
    <span>Total Balance</span>
  </div>

  <div class="card">👥 Referral aktif: <b id="refActive">0</b></div>
  <div class="card">⚡ Mining rate: <b>0.8 / 24 jam</b></div>
</div>

<!-- WALLET -->
<div id="wallet" class="container hidden">
  <h2>👛 Wallet</h2>
  <div class="card"><b>Balance</b><h3 id="walletBalance">0.00 NPR</h3></div>
</div>

<!-- BONUS -->
<div id="bonus" class="container hidden">
  <h2>🎁 Bonus</h2>

  <div class="card">
    <b>Referral List</b>
    <div id="refList">Loading...</div>
  </div>

  <div class="card">
    <b>Your Referral Link</b><br>
    <small id="reflink"></small>
    <button class="btn" onclick="copyRef()">Copy Link</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="container hidden">
  <h2>⚙️ Settings</h2>
  <div class="card">
    <b>📄 Whitepaper</b><br>
    <button class="btn">View Whitepaper</button>
  </div>
</div>

<button class="mine-btn" onclick="mine()">⛏️</button>

<div class="bottom-nav">
  <div class="nav-item active" onclick="showTab('home',this)">🏠<br>Home</div>
  <div class="nav-item" onclick="showTab('wallet',this)">👛<br>Wallet</div>
  <div class="nav-item" onclick="showTab('bonus',this)">🎁<br>Bonus</div>
  <div class="nav-item" onclick="showTab('settings',this)">⚙️<br>Settings</div>
</div>

<script src="app.js"></script>
</body>
</html>
